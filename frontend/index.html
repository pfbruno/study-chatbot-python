<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Study Chatbot</h1>
      <p class="subtitle">Chatbot educacional com análise de dados</p>
    </header>

    <section class="input-section">
      <textarea id="question" placeholder="Digite sua pergunta..."></textarea>

      <div class="actions">
        <button id="send-btn">Enviar</button>
        <button id="clear-btn" class="secondary">Limpar chat</button>
      </div>
    </section>

    <section class="chat-section">
      <h2>Chat</h2>
      <div class="chat-history" id="chat-history"></div>
    </section>

    <section class="stats-section">
      <h2>Estatísticas</h2>
      <button id="stats-btn">Atualizar estatísticas</button>

      <div class="stats-grid">
        <div class="stats-card">
          <h3>Resumo</h3>
          <pre id="stats">As estatísticas aparecerão aqui...</pre>
        </div>

        <div class="stats-card">
          <h3>Gráfico</h3>
          <canvas id="stats-chart"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
