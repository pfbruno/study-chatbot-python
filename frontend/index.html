<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Study Chatbot</h1>
    <p class="subtitle">Chatbot educacional com análise de dados</p>

    <div class="chat-box">
      <textarea id="question" placeholder="Digite sua pergunta..."></textarea>
      <button id="send-btn">Enviar</button>
    </div>

    <div class="chat-history" id="chat-history">
    </div>

    <div class="stats-box">
      <h2>Estatísticas</h2>
      <button id="stats-btn">Ver estatísticas</button>
      <pre id="stats">As estatísticas aparecerão aqui...</pre>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
